{% extends "base.html" %}
{% block content %}
<section class="form-wrap">
  <h1>{{ "Редактировать тренд" if trend else "Создать тренд" }}</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}

  <form method="post" class="stacked-form">
    <label>
      Название
      <input type="text" name="title" value="{{ trend.title if trend else '' }}" required />
    </label>

    <label>
      Тип
      <select name="type" required>
        <option value="photo" {% if trend and trend.type.value == "photo" %}selected{% endif %}>фото</option>
        <option value="video" {% if trend and trend.type.value == "video" %}selected{% endif %}>видео</option>
      </select>
    </label>

    <label>
      URL превью
      <input type="url" name="preview_url" value="{{ trend.preview_url if trend else '' }}" />
    </label>

    <label>
      Теги (через запятую)
      <input type="text" name="tags" value="{{ trend.tags | join(', ') if trend else '' }}" />
    </label>

    <label>
      Цена в токенах
      <input type="number" name="price_tokens" min="0" value="{{ trend.price_tokens if trend else 0 }}" required />
    </label>

    <label>
      Шаблон промпта
      <textarea name="prompt_template" rows="5">{{ trend.prompt_template if trend and trend.prompt_template else '' }}</textarea>
    </label>

    <label class="check-row">
      <input type="checkbox" name="is_active" value="true" {% if not trend or trend.is_active %}checked{% endif %} />
      Активен
    </label>

    <label class="check-row">
      <input type="checkbox" name="is_popular" value="true" {% if trend and trend.is_popular %}checked{% endif %} />
      Популярный
    </label>

    <button class="btn" type="submit">Сохранить</button>
  </form>
</section>
{% endblock %}
